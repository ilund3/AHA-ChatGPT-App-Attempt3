<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Walk Registration – Hydrocephalus Association</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        background: #ffffff;
        font-family: "Montserrat", "Segoe UI", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 280px;
      }

      .modal-wrapper {
        position: relative;
        width: 100%;
        max-width: 640px;
        padding: 40px 48px 44px;
        background: #ffffff;
        border-radius: 4px;
      }

      .close-btn {
        position: absolute;
        top: 14px;
        right: 16px;
        background: none;
        border: none;
        cursor: pointer;
        color: #888;
        font-size: 18px;
        line-height: 1;
        padding: 4px 6px;
        border-radius: 4px;
        transition: color 0.15s, background 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .close-btn:hover {
        color: #333;
        background: #f2f2f2;
      }

      .modal__title {
        font-size: 22px;
        font-weight: 700;
        color: #222;
        text-align: center;
        margin-bottom: 6px;
        letter-spacing: -0.2px;
      }

      .modal__subtitle {
        font-size: 13px;
        font-weight: 500;
        color: #36c0e7;
        text-align: center;
        margin-bottom: 32px;
        letter-spacing: 0.2px;
        text-transform: uppercase;
      }

      .entity-switch-modal__container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 40px;
      }

      .entity-switch-modal__button {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        text-decoration: none;
        color: #555;
        border: none;
        background: none;
        padding: 4px 8px 8px;
        border-radius: 8px;
        transition: background 0.18s;
        outline: none;
      }

      .entity-switch-modal__button:hover,
      .entity-switch-modal__button:focus {
        background: #f5fcfe;
      }

      .entity-switch-modal__button:hover .icon-circle {
        box-shadow: 0 2px 12px rgba(54, 192, 231, 0.25);
        transform: translateY(-2px);
      }

      .icon-circle {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        overflow: hidden;
        transition: box-shadow 0.18s, transform 0.18s;
        flex-shrink: 0;
      }

      .icon-circle img,
      .icon-circle svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .entity-switch-modal__message {
        font-size: 13px;
        font-weight: 500;
        color: #555;
        text-align: center;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>

      <button class="close-btn" aria-label="Close" onclick="this.closest('.modal-wrapper').style.display='none'">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

      <p class="modal__subtitle" id="walk-location-label">WALK to End Hydrocephalus</p>

    <script>
      // Inject walk location from server-rendered template variable
      const walkLocation = "{{WALK_LOCATION}}";
      const labelEl = document.getElementById("walk-location-label");
      if (walkLocation && walkLocation !== "{{WALK_LOCATION}}") {
        labelEl.textContent = walkLocation + " · WALK to End Hydrocephalus";
      }
    </script>
